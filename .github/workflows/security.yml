name: Security Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security smoke tests
        run: npm test

      - name: Audit production dependencies
        run: npm run security:audit

      - name: Build
        env:
          DATABASE_URL: "file:./dev.db"
          NEXTAUTH_SECRET: "ci-only-secret"
          AI_PROVIDER: "ollama"
          AI_EXTERNAL_CALLS_DISABLED: "true"
        run: npm run build

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
